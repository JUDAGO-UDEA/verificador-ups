<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verificador de UPs · ZASCA</title>
<style>
  :root {
    --bg: #F7F8FA; --surface: #FFFFFF; --surface2: #F0F2F5;
    --border: #E2E5EA; --border-strong: #C8CDD6;
    --text-primary: #111827; --text-secondary: #4B5563; --text-muted: #9CA3AF;
    --accent: #2563EB; --accent-hover: #1D4ED8; --accent-light: #EFF6FF; --accent-text: #1E40AF;
    --success: #059669; --success-light: #ECFDF5; --success-text: #065F46; --success-border: #A7F3D0;
    --warning: #D97706; --warning-light: #FFFBEB; --warning-text: #92400E; --warning-border: #FDE68A;
    --danger: #DC2626; --danger-light: #FEF2F2; --danger-text: #991B1B; --danger-border: #FECACA;
    --purple: #7C3AED; --purple-light: #F5F3FF; --purple-text: #4C1D95;
    --radius: 8px; --radius-lg: 12px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: var(--text-primary); min-height: 100vh; }
  .shell { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.25rem 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 10; }
  .main { margin-left: 220px; padding: 2rem 1.5rem; max-width: 820px; width: 100%; }
  .logo { padding: 0 1.25rem 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 0.75rem; }
  .logo-title { font-size: 15px; font-weight: 600; }
  .logo-sub { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 1.25rem; font-size: 14px; color: var(--text-secondary); cursor: pointer; border: none; background: none; width: 100%; text-align: left; border-left: 3px solid transparent; transition: all 0.12s; font-family: inherit; }
  .nav-item:hover { background: var(--bg); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-light); color: var(--accent-text); border-left-color: var(--accent); font-weight: 500; }
  .badge { background: var(--danger); color: #fff; border-radius: 20px; font-size: 11px; font-weight: 600; min-width: 18px; height: 18px; padding: 0 5px; display: none; align-items: center; justify-content: center; margin-left: auto; }
  .view { display: none; }
  .view.active { display: block; }
  .page-header { margin-bottom: 1.5rem; }
  .page-title { font-size: 22px; font-weight: 600; }
  .page-sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem; margin-bottom: 1rem; box-shadow: var(--shadow); }
  label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
  input[type=text], select, textarea { width: 100%; padding: 8px 12px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 14px; color: var(--text-primary); background: var(--surface); font-family: inherit; transition: border-color 0.15s, box-shadow 0.15s; outline: none; margin-bottom: 1rem; }
  input[type=text]:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  textarea { resize: vertical; min-height: 72px; }
  .tipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1rem; }
  .tipo-opt { position: relative; }
  .tipo-opt input[type=checkbox] { position: absolute; opacity: 0; width: 0; height: 0; }
  .tipo-label { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border: 1.5px solid var(--border-strong); border-radius: var(--radius); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.12s; color: var(--text-secondary); background: var(--surface); }
  .tipo-opt input:checked + .tipo-label { border-color: var(--accent); background: var(--accent-light); color: var(--accent-text); }
  .tipo-opt.purple input:checked + .tipo-label { border-color: var(--purple); background: var(--purple-light); color: var(--purple-text); }
  .tipo-opt.warning input:checked + .tipo-label { border-color: var(--warning); background: var(--warning-light); color: var(--warning-text); }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot-v12 { background: var(--accent); }
  .dot-tf { background: var(--warning); }
  .dot-todo { background: var(--purple); }
  .pill { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; }
  .pill-v12 { background: var(--accent-light); color: var(--accent-text); }
  .pill-tf { background: var(--warning-light); color: var(--warning-text); }
  .pill-todo { background: var(--purple-light); color: var(--purple-text); }
  .pill-pending { background: var(--warning-light); color: var(--warning-text); }
  .pill-done { background: var(--success-light); color: var(--success-text); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 0 16px; height: 36px; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; border: 1px solid var(--border-strong); background: var(--surface); color: var(--text-primary); font-family: inherit; transition: all 0.12s; }
  .btn:hover { background: var(--bg); }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #fff; border-color: transparent; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-full { width: 100%; justify-content: center; }
  .btn-check { background: var(--success-light); color: var(--success-text); border-color: var(--success-border); font-size: 13px; height: 32px; padding: 0 12px; }
  .btn-check:hover { background: #D1FAE5; }
  .btn-checked { background: var(--success-light); color: var(--success-text); border-color: var(--success-border); font-size: 13px; height: 32px; padding: 0 12px; cursor: default; }
  .btn-sm { height: 30px; font-size: 13px; padding: 0 12px; }
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 1rem 1.25rem; box-shadow: var(--shadow); }
  .stat-num { font-size: 26px; font-weight: 600; line-height: 1; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .queue-item { border: 1px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 0.6rem; background: var(--surface); box-shadow: var(--shadow); overflow: hidden; transition: opacity 0.2s; }
  .queue-item.is-done { opacity: 0.5; }
  .queue-main { display: flex; align-items: flex-start; gap: 12px; padding: 1rem 1.25rem; }
  .queue-num { font-size: 11px; font-weight: 600; color: var(--text-muted); min-width: 22px; padding-top: 3px; }
  .queue-body { flex: 1; min-width: 0; }
  .queue-id { font-size: 15px; font-weight: 600; margin-bottom: 5px; }
  .queue-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin-bottom: 4px; }
  .queue-reporter { font-size: 13px; color: var(--text-secondary); }
  .queue-obs { font-size: 13px; color: var(--text-muted); margin-top: 3px; font-style: italic; }
  .queue-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .queue-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
  /* Panel de respuesta admin */
  .reply-panel { border-top: 1px solid var(--border); background: var(--surface2); padding: 0.75rem 1.25rem; display: none; }
  .reply-panel.open { display: block; }
  .reply-panel textarea { margin-bottom: 8px; min-height: 60px; font-size: 13px; }
  .reply-row { display: flex; gap: 8px; justify-content: flex-end; }
  /* Notificación compañero */
  .notif-card { background: var(--accent-light); border: 1.5px solid var(--accent); border-radius: var(--radius-lg); padding: 1rem 1.25rem; margin-bottom: 1rem; }
  .notif-card.has-reply { background: var(--warning-light); border-color: var(--warning); }
  .notif-title { font-size: 13px; font-weight: 600; color: var(--accent-text); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .notif-card.has-reply .notif-title { color: var(--warning-text); }
  .notif-up { font-size: 14px; font-weight: 600; color: var(--text-primary); }
  .notif-reply-box { background: var(--surface); border: 1px solid var(--warning-border); border-radius: var(--radius); padding: 8px 12px; margin-top: 8px; font-size: 13px; color: var(--text-primary); font-style: italic; }
  .notif-reply-box::before { content: '💬 '; }
  .alert { padding: 10px 14px; border-radius: var(--radius); font-size: 13px; margin-bottom: 1rem; display: none; align-items: center; gap: 8px; }
  .alert-ok { background: var(--success-light); color: var(--success-text); border: 1px solid var(--success-border); }
  .alert-err { background: var(--danger-light); color: var(--danger-text); border: 1px solid var(--danger-border); }
  .names-ta { font-family: monospace; font-size: 13px; min-height: 140px; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .sec-label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.75rem; }
  .empty { text-align: center; padding: 2.5rem 1rem; color: var(--text-muted); font-size: 14px; }
  .reporte-header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 1.5rem; display: flex; align-items: center; gap: 10px; }
  @media (max-width: 640px) {
    .sidebar { width: 100%; height: auto; position: relative; flex-direction: row; border-right: none; border-bottom: 1px solid var(--border); padding: 0.5rem; overflow-x: auto; }
    .main { margin-left: 0; padding: 1rem; }
    .shell { flex-direction: column; }
    .logo { display: none; }
    .nav-item { padding: 8px 10px; font-size: 13px; border-left: none; border-bottom: 3px solid transparent; }
    .nav-item.active { border-left: none; border-bottom-color: var(--accent); }
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const SB_URL = 'https://rvlviiskxsuqwwlnsiwp.supabase.co';
const SB_KEY = 'sb_publishable_TcyUigagoZqIXd2psCFkhQ_EASPkgt_';
const H = {'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const MODO_REPORTE = new URLSearchParams(window.location.search).get('modo') === 'reporte';

async function sbGet(t,q=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,body){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPatch(t,id,body){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbDelete(t,q){const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}

function fmt(ts){const d=new Date(ts);return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});}
function tipoPill(t){
  if(!t)return '';
  if(t==='Todo')return '<span class="pill pill-todo">★ Todo</span>';
  if(t==='V1 y V2')return '<span class="pill pill-v12">V1 + V2</span>';
  if(t==='Transferencias')return '<span class="pill pill-tf">Transferencias</span>';
  if(t.includes('+'))return t.split('+').map(x=>tipoPill(x.trim())).join(' ');
  return `<span class="pill pill-v12">${t}</span>`;
}
function showAlert(id,show){const el=document.getElementById(id);if(el)el.style.display=show?'flex':'none';}
const chkV12=()=>document.getElementById('chk-v12');
const chkTf=()=>document.getElementById('chk-tf');
const chkTodo=()=>document.getElementById('chk-todo');
function getTipos(){
  if(chkTodo().checked)return 'Todo';
  const sel=[];
  if(chkV12().checked)sel.push('V1 y V2');
  if(chkTf().checked)sel.push('Transferencias');
  return sel.join(' + ');
}

// ── FORMULARIO HTML compartido ───────────────────────────────────────────────
function formHTML(){
  return `
    <div id="alert-ok" class="alert alert-ok">✓ Reporte enviado. Juan David lo verá en su cola.</div>
    <div id="alert-err" class="alert alert-err">✗ <span id="err-msg"></span></div>
    <div class="card">
      <label for="sel-nombre">Tu nombre</label>
      <select id="sel-nombre"><option value="">— cargando… —</option></select>
      <label for="inp-up">ID de la Unidad Productiva</label>
      <input type="text" id="inp-up" placeholder="Ej: UP-2024-031" autocomplete="off" />
      <label>¿Qué debo verificar / cargar?</label>
      <div class="tipo-grid">
        <div class="tipo-opt">
          <input type="checkbox" id="chk-v12" />
          <label class="tipo-label" for="chk-v12"><span class="dot dot-v12"></span> Visita 1 y Visita 2</label>
        </div>
        <div class="tipo-opt warning">
          <input type="checkbox" id="chk-tf" />
          <label class="tipo-label" for="chk-tf"><span class="dot dot-tf"></span> Transferencias</label>
        </div>
        <div class="tipo-opt purple" style="grid-column:1/-1;">
          <input type="checkbox" id="chk-todo" />
          <label class="tipo-label" for="chk-todo"><span class="dot dot-todo"></span> ★ Todo lo anterior</label>
        </div>
      </div>
      <label for="inp-obs">Observaciones <span style="font-weight:400;color:var(--text-muted)">(opcional)</span></label>
      <textarea id="inp-obs" placeholder="Detalles adicionales, pendientes, notas…"></textarea>
      <button class="btn btn-primary btn-full" id="btn-enviar" onclick="enviarReporte()">↑ Enviar reporte</button>
    </div>`;
}

function initCheckboxes(){
  chkTodo().addEventListener('change',()=>{if(chkTodo().checked){chkV12().checked=false;chkTf().checked=false;}});
  [chkV12(),chkTf()].forEach(c=>c.addEventListener('change',()=>{if(c.checked)chkTodo().checked=false;}));
}

// ── MODO REPORTE ─────────────────────────────────────────────────────────────
function renderModoReporte(){
  document.getElementById('app').innerHTML=`
    <div class="reporte-header">
      <span style="font-size:22px">🏭</span>
      <div>
        <div class="logo-title">Verificador UPs · ZASCA</div>
        <div style="font-size:12px;color:var(--text-muted)">iNNpulsa Colombia</div>
      </div>
    </div>
    <div style="max-width:560px;margin:0 auto;padding:1.5rem 1rem;">
      <div id="notif-area"></div>
      ${formHTML()}
      <div id="mis-sec" style="display:none;">
        <div class="sec-label" style="margin-top:1rem;">Mis reportes</div>
        <div id="mis-list"></div>
      </div>
    </div>`;
  initCheckboxes();
  document.getElementById('sel-nombre').addEventListener('change', ()=>{
    cargarMisReportes();
    cargarNotificaciones();
  });
  cargarNombres();
}

// ── MODO ADMIN ───────────────────────────────────────────────────────────────
function renderModoAdmin(){
  document.getElementById('app').innerHTML=`
    <div class="shell">
      <aside class="sidebar">
        <div class="logo">
          <div class="logo-title">🏭 Verificador UPs</div>
          <div class="logo-sub">ZASCA · iNNpulsa Colombia</div>
        </div>
        <button class="nav-item active" onclick="switchView('form')" id="nav-form">📋 Reportar UP</button>
        <button class="nav-item" onclick="switchView('admin')" id="nav-admin">
          📊 Cola de verificación
          <span class="badge" id="badge-admin">0</span>
        </button>
        <button class="nav-item" onclick="switchView('config')" id="nav-config">⚙️ Configurar</button>
      </aside>
      <main class="main">

        <div id="view-form" class="view active">
          <div class="page-header">
            <div class="page-title">Reportar Unidad Productiva</div>
            <div class="page-sub">Indica qué UP debe verificarse y cargarse</div>
          </div>
          ${formHTML()}
          <div id="mis-sec" style="display:none;">
            <div class="sec-label" style="margin-top:1rem;">Mis reportes</div>
            <div id="mis-list"></div>
          </div>
        </div>

        <div id="view-admin" class="view">
          <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
            <div>
              <div class="page-title">Cola de verificación</div>
              <div class="page-sub">En orden de llegada · marca cada UP cuando la completes</div>
            </div>
            <button class="btn" onclick="cargarAdmin()">↻ Actualizar</button>
          </div>
          <div class="stats">
            <div class="stat"><div class="stat-num" id="st-total">—</div><div class="stat-label">Reportadas</div></div>
            <div class="stat"><div class="stat-num" id="st-pend">—</div><div class="stat-label">Pendientes</div></div>
            <div class="stat"><div class="stat-num" id="st-done">—</div><div class="stat-label">Verificadas</div></div>
          </div>
          <div id="queue-list"><div class="empty"><span class="spinner"></span></div></div>
        </div>

        <div id="view-config" class="view">
          <div class="page-header">
            <div class="page-title">Configuración</div>
            <div class="page-sub">Lista de compañeros y enlaces para compartir</div>
          </div>
          <div class="card">
            <div class="sec-label">Lista de compañeros</div>
            <label for="names-ta">Un nombre por línea</label>
            <textarea id="names-ta" class="names-ta" placeholder="Ana García&#10;Carlos Pérez&#10;María López"></textarea>
            <div id="cfg-ok" class="alert alert-ok">✓ Lista guardada correctamente.</div>
            <div id="cfg-err" class="alert alert-err">✗ <span id="cfg-err-msg"></span></div>
            <button class="btn btn-primary" id="btn-guardar" onclick="guardarNombres()">💾 Guardar lista</button>
          </div>
          <div class="card">
            <div class="sec-label">Enlace para compañeros</div>
            <p style="font-size:13px;color:var(--text-secondary);margin-bottom:10px;">
              Comparte este enlace. Tus compañeros solo verán el formulario y sus notificaciones — sin acceso a la cola ni configuración.
            </p>
            <div id="share-url" style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:12px;color:var(--text-secondary);font-family:monospace;word-break:break-all;margin-bottom:10px;">Calculando…</div>
            <button class="btn" onclick="copiarEnlace()">📋 Copiar enlace de reporte</button>
          </div>
        </div>

      </main>
    </div>`;

  initCheckboxes();
  document.getElementById('sel-nombre').addEventListener('change', cargarMisReportes);
  cargarNombres();
  actualizarBadge();
  generarEnlaceCompartir();
}

function generarEnlaceCompartir(){
  const base=window.location.href.split('?')[0];
  const el=document.getElementById('share-url');
  if(el) el.textContent=base+'?modo=reporte';
}

function copiarEnlace(){
  const url=document.getElementById('share-url').textContent;
  navigator.clipboard.writeText(url).then(()=>{
    const btn=event.target.closest('button');
    const orig=btn.innerHTML;
    btn.innerHTML='✓ Copiado';
    setTimeout(()=>{btn.innerHTML=orig;},2000);
  });
}

function switchView(v){
  ['form','admin','config'].forEach(x=>{
    document.getElementById('view-'+x).classList.toggle('active',x===v);
    document.getElementById('nav-'+x).classList.toggle('active',x===v);
  });
  if(v==='admin') cargarAdmin();
  if(v==='config'){cargarConfig();generarEnlaceCompartir();}
  if(v==='form') cargarMisReportes();
}

// ── FUNCIONES COMPARTIDAS ────────────────────────────────────────────────────
async function cargarNombres(){
  try{
    const data=await sbGet('nombres','order=nombre.asc');
    const sel=document.getElementById('sel-nombre');
    const cur=sel.value;
    sel.innerHTML='<option value="">— selecciona tu nombre —</option>';
    data.forEach(n=>{const o=document.createElement('option');o.value=n.nombre;o.textContent=n.nombre;sel.appendChild(o);});
    if(cur)sel.value=cur;
  }catch{document.getElementById('sel-nombre').innerHTML='<option value="">Error cargando nombres</option>';}
}

async function enviarReporte(){
  const nombre=document.getElementById('sel-nombre').value;
  const upId=document.getElementById('inp-up').value.trim();
  const tipo=getTipos();
  const obs=document.getElementById('inp-obs').value.trim();
  showAlert('alert-ok',false);showAlert('alert-err',false);
  if(!nombre){alert('Selecciona tu nombre.');return;}
  if(!upId){alert('Ingresa el ID de la Unidad Productiva.');return;}
  if(!tipo){alert('Selecciona al menos un tipo de verificación.');return;}
  const btn=document.getElementById('btn-enviar');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Enviando…';
  try{
    await sbPost('reportes',{up_id:upId,nombre,tipo,obs:obs||null,done:false,respuesta:null,respuesta_leida:false});
    document.getElementById('inp-up').value='';
    document.getElementById('inp-obs').value='';
    chkV12().checked=false;chkTf().checked=false;chkTodo().checked=false;
    showAlert('alert-ok',true);
    setTimeout(()=>showAlert('alert-ok',false),4500);
    cargarMisReportes();
    if(!MODO_REPORTE)actualizarBadge();
  }catch(e){
    document.getElementById('err-msg').textContent=e.message;
    showAlert('alert-err',true);
  }
  btn.disabled=false;btn.innerHTML='↑ Enviar reporte';
}

async function cargarNotificaciones(){
  const nombre=document.getElementById('sel-nombre').value;
  const area=document.getElementById('notif-area');
  if(!area||!nombre){return;}
  try{
    // UPs verificadas con respuesta no leída
    const data=await sbGet('reportes',`nombre=eq.${encodeURIComponent(nombre)}&done=eq.true&respuesta_leida=eq.false&select=id,up_id,tipo,respuesta,done_ts`);
    if(!data.length){area.innerHTML='';return;}
    area.innerHTML=data.map(r=>`
      <div class="notif-card ${r.respuesta?'has-reply':''}" id="notif-${r.id}">
        <div class="notif-title">
          ${r.respuesta?'💬 Juan David dejó una observación':'✅ UP verificada'}
        </div>
        <div class="notif-up">${r.up_id} · ${tipoPill(r.tipo)}</div>
        ${r.respuesta?`<div class="notif-reply-box">${r.respuesta}</div>`:''}
        <div style="margin-top:10px;display:flex;justify-content:flex-end;">
          <button class="btn btn-sm" onclick="marcarNotifLeida(${r.id})">✓ Entendido</button>
        </div>
      </div>`).join('');
  }catch{}
}

async function marcarNotifLeida(id){
  try{
    await sbPatch('reportes',id,{respuesta_leida:true});
    document.getElementById('notif-'+id)?.remove();
  }catch(e){alert('Error: '+e.message);}
}

async function cargarMisReportes(){
  const nombre=document.getElementById('sel-nombre').value;
  const sec=document.getElementById('mis-sec'),list=document.getElementById('mis-list');
  if(!nombre){if(sec)sec.style.display='none';return;}
  if(MODO_REPORTE) cargarNotificaciones();
  try{
    const data=await sbGet('reportes',`nombre=eq.${encodeURIComponent(nombre)}&order=created_at.desc`);
    if(!data.length){if(sec)sec.style.display='none';return;}
    if(sec)sec.style.display='block';
    list.innerHTML=data.map(r=>`
      <div class="queue-item ${r.done?'is-done':''}">
        <div class="queue-main">
          <div class="queue-body">
            <div class="queue-id">${r.up_id}</div>
            <div class="queue-meta">${tipoPill(r.tipo)} ${r.done?'<span class="pill pill-done">✓ Verificado</span>':'<span class="pill pill-pending">Pendiente</span>'}</div>
            ${r.obs?`<div class="queue-obs">"${r.obs}"</div>`:''}
            ${r.respuesta?`<div style="margin-top:6px;font-size:13px;color:var(--warning-text);background:var(--warning-light);border-radius:6px;padding:6px 10px;">💬 <b>Respuesta:</b> ${r.respuesta}</div>`:''}
            <div class="queue-time">${fmt(r.created_at)}${r.done&&r.done_ts?' · verificado '+fmt(r.done_ts):''}</div>
          </div>
        </div>
      </div>`).join('');
  }catch{if(sec)sec.style.display='none';}
}

async function cargarAdmin(){
  const list=document.getElementById('queue-list');
  list.innerHTML='<div class="empty"><span class="spinner"></span></div>';
  try{
    const data=await sbGet('reportes','order=created_at.asc');
    const total=data.length,done=data.filter(r=>r.done).length;
    document.getElementById('st-total').textContent=total;
    document.getElementById('st-pend').textContent=total-done;
    document.getElementById('st-done').textContent=done;
    actualizarBadge(total-done);
    if(!total){list.innerHTML='<div class="empty">📥<br>Sin reportes aún.</div>';return;}
    list.innerHTML=data.map((r,i)=>`
      <div class="queue-item ${r.done?'is-done':''}" id="qi-${r.id}">
        <div class="queue-main">
          <div class="queue-num">#${i+1}</div>
          <div class="queue-body">
            <div class="queue-id">${r.up_id}</div>
            <div class="queue-meta">${tipoPill(r.tipo)}<span class="queue-reporter">👤 ${r.nombre}</span></div>
            ${r.obs?`<div class="queue-obs">"${r.obs}"</div>`:''}
            ${r.respuesta?`<div style="margin-top:5px;font-size:12px;color:var(--warning-text);">💬 Respuesta enviada: "${r.respuesta}"</div>`:''}
            <div class="queue-time">⏱ ${fmt(r.created_at)}</div>
          </div>
          <div class="queue-actions">
            ${r.done
              ?`<button class="btn btn-checked btn-sm" disabled>✓ Listo</button>
                <button class="btn btn-sm" onclick="toggleReply(${r.id})">💬 ${r.respuesta?'Editar resp.':'Responder'}</button>`
              :`<button class="btn btn-check btn-sm" onclick="abrirVerificar(${r.id})">✓ Marcar listo</button>`
            }
          </div>
        </div>
        <div class="reply-panel" id="reply-${r.id}">
          <label style="font-size:12px;margin-bottom:4px;">Observación de devolución para ${r.nombre}:</label>
          <textarea id="ta-reply-${r.id}" placeholder="Escribe tu observación aquí…">${r.respuesta||''}</textarea>
          <div class="reply-row">
            <button class="btn btn-sm" onclick="toggleReply(${r.id})">Cancelar</button>
            <button class="btn btn-primary btn-sm" onclick="enviarRespuesta(${r.id})">💬 Enviar respuesta</button>
          </div>
        </div>
        ${!r.done?`
        <div class="reply-panel" id="verificar-${r.id}">
          <label style="font-size:12px;margin-bottom:4px;">Observación al verificar (opcional):</label>
          <textarea id="ta-verificar-${r.id}" placeholder="Escribe una observación para ${r.nombre}…"></textarea>
          <div class="reply-row">
            <button class="btn btn-sm" onclick="cerrarVerificar(${r.id})">Cancelar</button>
            <button class="btn btn-check btn-sm" onclick="marcarHecho(${r.id})">✓ Confirmar verificación</button>
          </div>
        </div>`:''}
      </div>`).join('');
  }catch(e){list.innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

function abrirVerificar(id){
  document.querySelectorAll('[id^="verificar-"]').forEach(el=>el.classList.remove('open'));
  document.querySelectorAll('[id^="reply-"]').forEach(el=>el.classList.remove('open'));
  document.getElementById('verificar-'+id)?.classList.add('open');
}
function cerrarVerificar(id){document.getElementById('verificar-'+id)?.classList.remove('open');}

function toggleReply(id){
  const panel=document.getElementById('reply-'+id);
  if(panel) panel.classList.toggle('open');
}

async function marcarHecho(id){
  const ta=document.getElementById('ta-verificar-'+id);
  const respuesta=ta?ta.value.trim():null;
  const btn=event.target;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    await sbPatch('reportes',id,{done:true,done_ts:new Date().toISOString(),respuesta:respuesta||null,respuesta_leida:false});
    cargarAdmin();
  }catch(e){
    alert('Error: '+e.message);
    btn.disabled=false;btn.innerHTML='✓ Confirmar verificación';
  }
}

async function enviarRespuesta(id){
  const ta=document.getElementById('ta-reply-'+id);
  const respuesta=ta?ta.value.trim():'';
  if(!respuesta){alert('Escribe una observación antes de enviar.');return;}
  const btn=event.target;
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{
    await sbPatch('reportes',id,{respuesta,respuesta_leida:false});
    toggleReply(id);
    cargarAdmin();
  }catch(e){
    alert('Error: '+e.message);
    btn.disabled=false;btn.innerHTML='💬 Enviar respuesta';
  }
}

async function actualizarBadge(pend){
  if(pend===undefined){try{const d=await sbGet('reportes','done=eq.false&select=id');pend=d.length;}catch{return;}}
  const badge=document.getElementById('badge-admin');
  if(!badge)return;
  if(pend>0){badge.textContent=pend;badge.style.display='inline-flex';}
  else{badge.style.display='none';}
}

async function cargarConfig(){
  try{const data=await sbGet('nombres','order=nombre.asc');document.getElementById('names-ta').value=data.map(n=>n.nombre).join('\n');}catch{}
}

async function guardarNombres(){
  const raw=document.getElementById('names-ta').value;
  const names=raw.split('\n').map(n=>n.trim()).filter(Boolean);
  showAlert('cfg-ok',false);showAlert('cfg-err',false);
  const btn=document.getElementById('btn-guardar');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Guardando…';
  try{
    await sbDelete('nombres','id=gte.0');
    if(names.length)await sbPost('nombres',names.map(n=>({nombre:n})));
    showAlert('cfg-ok',true);setTimeout(()=>showAlert('cfg-ok',false),3000);
    cargarNombres();
  }catch(e){document.getElementById('cfg-err-msg').textContent=e.message;showAlert('cfg-err',true);}
  btn.disabled=false;btn.innerHTML='💾 Guardar lista';
}

// Iniciar
if(MODO_REPORTE){renderModoReporte();}else{renderModoAdmin();}
</script>
</body>
</html>
