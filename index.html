<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verificador de UPs · Prosperidad y UDEA</title>
<style>
  :root {
    --bg:#F7F8FA;--surface:#fff;--surface2:#F0F2F5;--border:#E2E5EA;--border-strong:#C8CDD6;
    --text-primary:#111827;--text-secondary:#4B5563;--text-muted:#9CA3AF;
    --accent:#2563EB;--accent-hover:#1D4ED8;--accent-light:#EFF6FF;--accent-text:#1E40AF;
    --success:#059669;--success-light:#ECFDF5;--success-text:#065F46;--success-border:#A7F3D0;
    --warning:#D97706;--warning-light:#FFFBEB;--warning-text:#92400E;--warning-border:#FDE68A;
    --danger:#DC2626;--danger-light:#FEF2F2;--danger-text:#991B1B;--danger-border:#FECACA;
    --purple:#7C3AED;--purple-light:#F5F3FF;--purple-text:#4C1D95;
    --radius:8px;--radius-lg:12px;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--text-primary);min-height:100vh;}
  .shell{display:flex;min-height:100vh;}
  .sidebar{width:220px;background:var(--surface);border-right:1px solid var(--border);padding:1.25rem 0;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:10;}
  .main{margin-left:220px;padding:2rem 1.5rem;max-width:860px;width:100%;}
  .logo{padding:0 1.25rem 1.25rem;border-bottom:1px solid var(--border);margin-bottom:.75rem;}
  .logo-title{font-size:14px;font-weight:600;line-height:1.3;}
  .logo-sub{font-size:11px;color:var(--text-muted);margin-top:3px;}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 1.25rem;font-size:14px;color:var(--text-secondary);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all .12s;font-family:inherit;}
  .nav-item:hover{background:var(--bg);color:var(--text-primary);}
  .nav-item.active{background:var(--accent-light);color:var(--accent-text);border-left-color:var(--accent);font-weight:500;}
  .badge{background:var(--danger);color:#fff;border-radius:20px;font-size:11px;font-weight:600;min-width:18px;height:18px;padding:0 5px;display:none;align-items:center;justify-content:center;margin-left:auto;}
  .view{display:none;}.view.active{display:block;}
  .page-header{margin-bottom:1.5rem;}
  .page-title{font-size:22px;font-weight:600;}
  .page-sub{font-size:14px;color:var(--text-muted);margin-top:4px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);}
  label{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;}
  input[type=text],select,textarea{width:100%;padding:8px 12px;border:1px solid var(--border-strong);border-radius:var(--radius);font-size:14px;color:var(--text-primary);background:var(--surface);font-family:inherit;transition:border-color .15s,box-shadow .15s;outline:none;margin-bottom:1rem;}
  input[type=text]:focus,select:focus,textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);}
  textarea{resize:vertical;min-height:72px;}
  .tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1rem;}
  .tipo-opt{position:relative;}
  .tipo-opt input[type=checkbox]{position:absolute;opacity:0;width:0;height:0;}
  .tipo-label{display:flex;align-items:center;gap:8px;padding:9px 12px;border:1.5px solid var(--border-strong);border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;color:var(--text-secondary);background:var(--surface);}
  .tipo-opt input:checked+.tipo-label{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text);}
  .tipo-opt.purple input:checked+.tipo-label{border-color:var(--purple);background:var(--purple-light);color:var(--purple-text);}
  .tipo-opt.warning input:checked+.tipo-label{border-color:var(--warning);background:var(--warning-light);color:var(--warning-text);}
  .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .dot-v12{background:var(--accent);}.dot-tf{background:var(--warning);}.dot-todo{background:var(--purple);}
  .pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;}
  .pill-v12{background:var(--accent-light);color:var(--accent-text);}
  .pill-tf{background:var(--warning-light);color:var(--warning-text);}
  .pill-todo{background:var(--purple-light);color:var(--purple-text);}
  .pill-pending{background:var(--warning-light);color:var(--warning-text);}
  .pill-done{background:var(--success-light);color:var(--success-text);}
  .pill-espera{background:var(--danger-light);color:var(--danger-text);}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:0 16px;height:36px;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;border:1px solid var(--border-strong);background:var(--surface);color:var(--text-primary);font-family:inherit;transition:all .12s;}
  .btn:hover{background:var(--bg);}.btn:disabled{opacity:.45;cursor:not-allowed;}
  .btn-primary{background:var(--accent);color:#fff;border-color:transparent;}
  .btn-primary:hover{background:var(--accent-hover);}
  .btn-full{width:100%;justify-content:center;}
  .btn-check{background:var(--success-light);color:var(--success-text);border-color:var(--success-border);font-size:13px;height:32px;padding:0 12px;}
  .btn-check:hover{background:#D1FAE5;}
  .btn-checked{background:var(--success-light);color:var(--success-text);border-color:var(--success-border);font-size:13px;height:32px;padding:0 12px;cursor:default;}
  .btn-sm{height:30px;font-size:13px;padding:0 12px;}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem;box-shadow:var(--shadow);}
  .stat-num{font-size:26px;font-weight:600;line-height:1;}
  .stat-label{font-size:12px;color:var(--text-muted);margin-top:4px;}
  /* Cola */
  .queue-item{border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:.6rem;background:var(--surface);box-shadow:var(--shadow);overflow:hidden;transition:opacity .2s;position:relative;}
  .queue-item.is-done{opacity:.5;}
  .queue-item.is-espera{border-left:3px solid var(--danger);background:#fff8f8;}
  .queue-item.is-flagged{border-right:3px solid #EF4444;}
  .queue-item.selected{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.15);}
  .queue-main{display:flex;align-items:flex-start;gap:12px;padding:1rem 1.25rem;}
  .queue-check{display:flex;align-items:center;padding-top:2px;}
  .queue-check input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--accent);}
  .queue-num{font-size:11px;font-weight:600;color:var(--text-muted);min-width:22px;padding-top:3px;}
  .queue-body{flex:1;min-width:0;}
  .queue-id{font-size:15px;font-weight:600;margin-bottom:5px;}
  .queue-meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px;}
  .queue-reporter{font-size:13px;color:var(--text-secondary);}
  .queue-obs{font-size:13px;color:var(--text-muted);margin-top:3px;font-style:italic;}
  .queue-time{font-size:11px;color:var(--text-muted);margin-top:4px;}
  .queue-actions{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;}
  .flag-btn{position:absolute;top:8px;right:8px;background:none;border:none;cursor:pointer;font-size:18px;line-height:1;opacity:.25;transition:opacity .15s,transform .15s;padding:2px;}
  .flag-btn:hover{opacity:.7;transform:scale(1.2);}
  .flag-btn.flagged{opacity:1;}
  /* Panel respuesta */
  .reply-panel{border-top:1px solid var(--border);background:var(--surface2);padding:.75rem 1.25rem;display:none;}
  .reply-panel.open{display:block;}
  .reply-panel textarea{margin-bottom:8px;min-height:60px;font-size:13px;}
  .reply-row{display:flex;gap:8px;justify-content:flex-end;}
  /* Pestañas cola */
  .queue-tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:2px solid var(--border);}
  .queue-tab{padding:8px 18px;font-size:14px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--text-muted);border-bottom:2px solid transparent;margin-bottom:-2px;font-family:inherit;transition:all .12s;display:flex;align-items:center;gap:6px;}
  .queue-tab:hover{color:var(--text-primary);}
  .queue-tab.active{color:var(--accent-text);border-bottom-color:var(--accent);}
  .queue-tab .tab-badge{background:var(--warning);color:#fff;border-radius:20px;font-size:11px;font-weight:600;min-width:18px;height:18px;padding:0 5px;display:inline-flex;align-items:center;justify-content:center;}
  .queue-tab.active .tab-badge{background:var(--accent);}
  /* Notificaciones compañero */
  .notif-card{background:var(--accent-light);border:1.5px solid var(--accent);border-radius:var(--radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;}
  .notif-card.has-reply{background:var(--warning-light);border-color:var(--warning);}
  .notif-title{font-size:13px;font-weight:600;color:var(--accent-text);margin-bottom:4px;}
  .notif-card.has-reply .notif-title{color:var(--warning-text);}
  .notif-up{font-size:14px;font-weight:600;color:var(--text-primary);}
  .notif-reply-box{background:var(--surface);border:1px solid var(--warning-border);border-radius:var(--radius);padding:8px 12px;margin-top:8px;font-size:13px;color:var(--text-primary);font-style:italic;}
  /* Barra selección */
  .bulk-bar{display:none;background:var(--accent);color:#fff;border-radius:var(--radius-lg);padding:10px 16px;margin-bottom:1rem;align-items:center;gap:10px;flex-wrap:wrap;}
  .bulk-bar.visible{display:flex;}
  .bulk-bar span{flex:1;font-size:14px;font-weight:500;}
  .btn-bulk{border:none;border-radius:var(--radius);padding:0 14px;height:32px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
  .btn-bulk:hover{opacity:.85;}
  .btn-bulk-ok{background:var(--success);color:#fff;}
  .btn-bulk-del{background:var(--danger);color:#fff;}
  .btn-bulk-cancel{background:rgba(255,255,255,.2);color:#fff;}
  /* Alerts */
  .alert{padding:10px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:1rem;display:none;align-items:center;gap:8px;}
  .alert-ok{background:var(--success-light);color:var(--success-text);border:1px solid var(--success-border);}
  .alert-err{background:var(--danger-light);color:var(--danger-text);border:1px solid var(--danger-border);}
  .alert-warn{background:var(--warning-light);color:var(--warning-text);border:1px solid var(--warning-border);}
  .names-ta{font-family:monospace;font-size:13px;min-height:140px;}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* Filtros tipo Excel */
  .filter-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.875rem 1.25rem;margin-bottom:1rem;box-shadow:var(--shadow);}
  .filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
  .filter-group{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px;position:relative;}
  .filter-group label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text-muted);margin:0;}
  .filter-group input[type=date]{margin:0;height:34px;font-size:13px;padding:0 8px;}
  .filter-dropdown-btn{height:34px;font-size:13px;padding:0 10px;border:1px solid var(--border-strong);border-radius:var(--radius);background:var(--surface);color:var(--text-primary);cursor:pointer;text-align:left;display:flex;align-items:center;justify-content:space-between;gap:6px;font-family:inherit;width:100%;white-space:nowrap;overflow:hidden;}
  .filter-dropdown-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent-text);}
  .filter-dropdown-panel{position:absolute;top:calc(100% + 4px);left:0;min-width:180px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:0 4px 12px rgba(0,0,0,.1);z-index:50;padding:6px;display:none;}
  .filter-dropdown-panel.open{display:block;}
  .filter-chk-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text-primary);}
  .filter-chk-item:hover{background:var(--bg);}
  .filter-chk-item input[type=checkbox]{width:15px;height:15px;accent-color:var(--accent);cursor:pointer;flex-shrink:0;}
  .filter-sep{height:1px;background:var(--border);margin:4px 0;}
  .filter-count{font-size:12px;color:var(--text-muted);margin-top:6px;}
  .btn-clear-filters{height:34px;font-size:12px;padding:0 10px;color:var(--text-muted);border-color:var(--border);flex-shrink:0;}
  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius-lg);box-shadow:0 20px 60px rgba(0,0,0,.2);width:480px;max-width:95vw;max-height:85vh;display:flex;flex-direction:column;}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);}
  .modal-title{font-size:16px;font-weight:600;}
  .modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--text-muted);line-height:1;padding:2px 6px;border-radius:4px;}
  .modal-close:hover{background:var(--bg);color:var(--text-primary);}
  .modal-body{padding:1.25rem 1.5rem;overflow-y:auto;flex:1;}
  .modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;}
  .ups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:1rem;}
  .ups-chip{background:var(--accent-light);color:var(--accent-text);border:1px solid var(--border);border-radius:var(--radius);padding:7px 12px;font-size:13px;font-weight:500;text-align:center;}
  .modal-sub{font-size:13px;color:var(--text-muted);margin-bottom:1rem;}
  .modal-sec{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.6rem;margin-top:1rem;}
  .reporte-header{background:var(--surface);border-bottom:1px solid var(--border);padding:1rem 1.5rem;display:flex;align-items:center;gap:10px;}
  .empty{text-align:center;padding:2.5rem 1rem;color:var(--text-muted);font-size:14px;}
  @media(max-width:640px){
    .sidebar{width:100%;height:auto;position:relative;flex-direction:row;border-right:none;border-bottom:1px solid var(--border);padding:.5rem;overflow-x:auto;}
    .main{margin-left:0;padding:1rem;}.shell{flex-direction:column;}.logo{display:none;}
    .nav-item{padding:8px 10px;font-size:13px;border-left:none;border-bottom:3px solid transparent;}
    .nav-item.active{border-left:none;border-bottom-color:var(--accent);}
  }
</style>
</head>
<body>
<div id="app"></div>
<script>
const SB_URL='https://rvlviiskxsuqwwlnsiwp.supabase.co';
const SB_KEY='sb_publishable_TcyUigagoZqIXd2psCFkhQ_EASPkgt_';
const H={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};
const MODO_REPORTE=new URLSearchParams(window.location.search).get('modo')==='reporte';

// ── Supabase helpers ─────────────────────────────────────────────────────────
async function sbGet(t,q=''){const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,b){const r=await fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPatch(t,id,b){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'PATCH',headers:{...H,'Prefer':'return=representation'},body:JSON.stringify(b)});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbDeleteId(t,id){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=eq.${id}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}
async function sbDeleteMany(t,ids){const r=await fetch(`${SB_URL}/rest/v1/${t}?id=in.(${ids.join(',')})`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}
async function sbDelete(t,q){const r=await fetch(`${SB_URL}/rest/v1/${t}?${q}`,{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}

// ── Sonido ───────────────────────────────────────────────────────────────────
function sonidoExito(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[0,523.25],[.15,659.25],[.3,783.99]].forEach(([t,f])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+t);
      g.gain.setValueAtTime(.18,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.35);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.35);
    });
  }catch(e){}
}
function sonidoNuevoReporte(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[0,880],[.2,1046.5]].forEach(([t,f])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(f,ctx.currentTime+t);
      g.gain.setValueAtTime(.12,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+.3);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+.3);
    });
  }catch(e){}
}

// ── Utilidades ───────────────────────────────────────────────────────────────
function fmt(ts){const d=new Date(ts);return d.toLocaleDateString('es-CO',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});}
function tipoPill(t){
  if(!t)return '';
  if(t==='Todo')return '<span class="pill pill-todo">★ Todo</span>';
  if(t==='V1 y V2')return '<span class="pill pill-v12">V1 + V2</span>';
  if(t==='Transferencias')return '<span class="pill pill-tf">Transferencias</span>';
  if(t.includes('+'))return t.split('+').map(x=>tipoPill(x.trim())).join(' ');
  return `<span class="pill pill-v12">${t}</span>`;
}
function showAlert(id,show){const el=document.getElementById(id);if(el)el.style.display=show?'flex':'none';}
const chkV12=()=>document.getElementById('chk-v12');
const chkTf=()=>document.getElementById('chk-tf');
const chkTodo=()=>document.getElementById('chk-todo');
function getTipos(){
  if(chkTodo().checked)return 'Todo';
  const s=[];if(chkV12().checked)s.push('V1 y V2');if(chkTf().checked)s.push('Transferencias');
  return s.join(' + ');
}
function tiposSet(t){
  if(!t)return new Set();
  if(t==='Todo')return new Set(['V1 y V2','Transferencias','Todo']);
  return new Set(t.split('+').map(x=>x.trim()));
}

// ── Form HTML ─────────────────────────────────────────────────────────────────
function formHTML(){
  return `
    <div id="alert-dup" class="alert alert-warn">⚠️ <span id="dup-msg"></span></div>
    <div id="alert-ok" class="alert alert-ok">✓ Reporte enviado. Juan David lo verá en su cola.</div>
    <div id="alert-err" class="alert alert-err">✗ <span id="err-msg"></span></div>
    <div class="card">
      <label for="sel-nombre">Tu nombre</label>
      <select id="sel-nombre"><option value="">— cargando… —</option></select>
      <label for="inp-up">Número de la Unidad Productiva</label>
      <input type="text" id="inp-up" placeholder="Ej: 123456" autocomplete="off" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')" />
      <label>¿Qué debo verificar / cargar?</label>
      <div class="tipo-grid">
        <div class="tipo-opt"><input type="checkbox" id="chk-v12" /><label class="tipo-label" for="chk-v12"><span class="dot dot-v12"></span> Visita 1 y Visita 2</label></div>
        <div class="tipo-opt warning"><input type="checkbox" id="chk-tf" /><label class="tipo-label" for="chk-tf"><span class="dot dot-tf"></span> Transferencias</label></div>
        <div class="tipo-opt purple" style="grid-column:1/-1;"><input type="checkbox" id="chk-todo" /><label class="tipo-label" for="chk-todo"><span class="dot dot-todo"></span> ★ Todo lo anterior</label></div>
      </div>
      <label for="inp-obs">Observaciones <span style="font-weight:400;color:var(--text-muted)">(opcional)</span></label>
      <textarea id="inp-obs" placeholder="Detalles adicionales…"></textarea>
      <button class="btn btn-primary btn-full" id="btn-enviar" onclick="enviarReporte()">↑ Enviar reporte</button>
    </div>`;
}
function initCheckboxes(){
  chkTodo().addEventListener('change',()=>{if(chkTodo().checked){chkV12().checked=false;chkTf().checked=false;}});

}

let tabActiva='pend';

// ── Polling admin: detectar nuevos reportes ───────────────────────────────────
let _lastCount=null;
function iniciarPollingAdmin(){
  setInterval(async()=>{
    try{
      const d=await sbGet('reportes','select=id');
      if(_lastCount!==null && d.length>_lastCount){ sonidoNuevoReporte(); actualizarBadge(d.length - todosLosReportes.filter(r=>r.done).length); }
      _lastCount=d.length;
    }catch(e){}
  },15000);
}

// ── Polling compañero: detectar UPs verificadas ───────────────────────────────
function iniciarPollingReporte(){
  setInterval(async()=>{
    const nombre=document.getElementById('sel-nombre')?.value;
    if(!nombre)return;
    try{
      const d=await sbGet('reportes',`nombre=eq.${encodeURIComponent(nombre)}&done=eq.true&respuesta_leida=eq.false&select=id`);
      if(d.length>0){ sonidoExito(); cargarNotificaciones(); }
    }catch(e){}
  },15000);
}

// ── Nav admin ─────────────────────────────────────────────────────────────────
function generarEnlaceCompartir(){const base=window.location.href.split('?')[0];const el=document.getElementById('share-url');if(el)el.textContent=base+'?modo=reporte';}
function copiarEnlace(){const url=document.getElementById('share-url').textContent;navigator.clipboard.writeText(url).then(()=>{const btn=event.target.closest('button');const o=btn.innerHTML;btn.innerHTML='✓ Copiado';setTimeout(()=>{btn.innerHTML=o;},2000);});}
function switchView(v){
  ['form','admin','config'].forEach(x=>{document.getElementById('view-'+x).classList.toggle('active',x===v);document.getElementById('nav-'+x).classList.toggle('active',x===v);});
  if(v==='admin')cargarAdmin();
  if(v==='config'){cargarConfig();generarEnlaceCompartir();}
  if(v==='form')cargarMisReportes();
}

// ── Nombres ───────────────────────────────────────────────────────────────────
async function cargarNombres(){
  try{
    const data=await sbGet('nombres','order=nombre.asc');
    const sel=document.getElementById('sel-nombre');const cur=sel.value;
    sel.innerHTML='<option value="">— selecciona tu nombre —</option>';
    data.forEach(n=>{const o=document.createElement('option');o.value=n.nombre;o.textContent=n.nombre;sel.appendChild(o);});
    if(cur)sel.value=cur;
    if(MODO_REPORTE)iniciarPollingReporte();
  }catch{document.getElementById('sel-nombre').innerHTML='<option value="">Error cargando nombres</option>';}
}

// ── Enviar reporte ─────────────────────────────────────────────────────────────
async function enviarReporte(){
  const nombre=document.getElementById('sel-nombre').value;
  const upId=document.getElementById('inp-up').value.trim();
  const tipo=getTipos();
  const obs=document.getElementById('inp-obs').value.trim();
  showAlert('alert-ok',false);showAlert('alert-err',false);showAlert('alert-dup',false);
  if(!nombre){alert('Selecciona tu nombre.');return;}
  if(!upId){alert('Ingresa el número de la Unidad Productiva.');return;}
  if(!/^\d+$/.test(upId)){alert('Solo se permiten números.');return;}
  if(!tipo){alert('Selecciona al menos un tipo de verificación.');return;}
  try{
    const ex=await sbGet('reportes',`up_id=eq.${encodeURIComponent(upId)}&select=tipo`);
    const tNuevo=tiposSet(tipo);
    for(const e of ex){
      const tEx=tiposSet(e.tipo);
      const dup=[...tNuevo].some(t=>tEx.has(t)||tEx.has('Todo'))||[...tEx].some(t=>tNuevo.has(t)||tNuevo.has('Todo'));
      if(dup){document.getElementById('dup-msg').textContent=`La UP ${upId} ya tiene reporte para "${e.tipo}".`;showAlert('alert-dup',true);return;}
    }
  }catch(e){}
  const btn=document.getElementById('btn-enviar');
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Enviando…';
  try{
    await sbPost('reportes',{up_id:upId,nombre,tipo,obs:obs||null,done:false,estado:'pendiente',descargada:false,respuesta:null,respuesta_leida:false});
    document.getElementById('inp-up').value='';document.getElementById('inp-obs').value='';
    chkV12().checked=false;chkTf().checked=false;chkTodo().checked=false;
    sonidoExito();
    showAlert('alert-ok',true);setTimeout(()=>showAlert('alert-ok',false),4500);
    cargarMisReportes();
    if(!MODO_REPORTE)actualizarBadge();
  }catch(e){document.getElementById('err-msg').textContent=e.message;showAlert('alert-err',true);}
  btn.disabled=false;btn.innerHTML='↑ Enviar reporte';
}

// ── Notificaciones compañero ──────────────────────────────────────────────────
async function cargarNotificaciones(){
  const nombre=document.getElementById('sel-nombre').value;
  const area=document.getElementById('notif-area');
  if(!area||!nombre)return;
  try{
    const data=await sbGet('reportes',`nombre=eq.${encodeURIComponent(nombre)}&done=eq.true&respuesta_leida=eq.false&select=id,up_id,tipo,respuesta,done_ts`);
    if(!data.length){area.innerHTML='';return;}
    area.innerHTML=data.map(r=>`
      <div class="notif-card ${r.respuesta?'has-reply':''}" id="notif-${r.id}">
        <div class="notif-title">${r.respuesta?'💬 Juan David dejó una observación':'✅ UP verificada'}</div>
        <div class="notif-up">${r.up_id} · ${tipoPill(r.tipo)}</div>
        ${r.respuesta?`<div class="notif-reply-box">${r.respuesta}</div>`:''}
        <div style="margin-top:10px;display:flex;justify-content:flex-end;">
          <button class="btn btn-sm" onclick="marcarNotifLeida(${r.id})">✓ Entendido</button>
        </div>
      </div>`).join('');
  }catch(e){}
}
async function marcarNotifLeida(id){
  try{await sbPatch('reportes',id,{respuesta_leida:true});document.getElementById('notif-'+id)?.remove();}
  catch(e){alert('Error: '+e.message);}
}

// ── Mis reportes ──────────────────────────────────────────────────────────────
async function cargarMisReportes(){
  const nombre=document.getElementById('sel-nombre').value;
  const sec=document.getElementById('mis-sec'),list=document.getElementById('mis-list');
  if(!nombre){if(sec)sec.style.display='none';return;}
  if(MODO_REPORTE)cargarNotificaciones();
  try{
    const data=await sbGet('reportes',`nombre=eq.${encodeURIComponent(nombre)}&order=created_at.desc`);
    if(!data.length){if(sec)sec.style.display='none';return;}
    if(sec)sec.style.display='block';
    list.innerHTML=data.map(r=>`
      <div class="queue-item ${r.done?'is-done':''}">
        <div class="queue-main">
          <div class="queue-body">
            <div class="queue-id">${r.up_id}</div>
            <div class="queue-meta">${tipoPill(r.tipo)} ${r.done?'<span class="pill pill-done">✓ Verificado</span>':r.estado==='espera'?'<span class="pill pill-espera">⏸ En espera</span>':'<span class="pill pill-pending">Pendiente</span>'}</div>
            ${r.obs?`<div class="queue-obs">"${r.obs}"</div>`:''}
            ${r.respuesta?`<div style="margin-top:6px;font-size:13px;color:var(--warning-text);background:var(--warning-light);border-radius:6px;padding:6px 10px;">💬 <b>Respuesta:</b> ${r.respuesta}</div>`:''}
            <div class="queue-time">${fmt(r.created_at)}${r.done&&r.done_ts?' · verificado '+fmt(r.done_ts):''}</div>
          </div>
        </div>
      </div>`).join('');
  }catch(e){if(sec)sec.style.display='none';}
}

// ── Admin: cargar y renderizar cola ──────────────────────────────────────────
let todosLosReportes=[];

async function cargarAdmin(){
  const list=document.getElementById('queue-list');
  list.innerHTML='<div class="empty"><span class="spinner"></span></div>';
  try{
    const data=await sbGet('reportes','order=done.asc,estado.asc,created_at.asc');
    todosLosReportes=data;
    _lastCount=data.length;
    poblarFiltroNombres(data);
    const pend=data.filter(r=>!r.done).length;
    const done=data.length-pend;
    const tbP=document.getElementById('tbadge-pend');if(tbP)tbP.textContent=pend;
    const tbD=document.getElementById('tbadge-done');if(tbD)tbD.textContent=done;
    aplicarFiltros();
  }catch(e){document.getElementById('queue-list').innerHTML=`<div class="empty">Error: ${e.message}</div>`;}
}

function aplicarFiltros(){
  const selNombre=getCheckedValues('nombre');
  const selTipo=getCheckedValues('tipo');
  const selEstado=getCheckedValues('estado');
  const selDesc=getCheckedValues('desc');
  const fDesde=document.getElementById('f-desde')?.value||'';
  const fHasta=document.getElementById('f-hasta')?.value||'';
  let datos=todosLosReportes;
  // Filtrar por pestaña
  if(tabActiva==='pend') datos=datos.filter(r=>!r.done);
  else datos=datos.filter(r=>r.done);
  if(selNombre.length)datos=datos.filter(r=>selNombre.includes(r.nombre));
  if(selTipo.length)datos=datos.filter(r=>r.tipo&&selTipo.some(t=>r.tipo.includes(t)));
  if(selEstado.length){datos=datos.filter(r=>{if(r.done)return selEstado.includes('done');if(r.estado==='espera')return selEstado.includes('espera');return selEstado.includes('pendiente');});}
  if(selDesc.length&&selDesc.length<2){if(selDesc.includes('si'))datos=datos.filter(r=>r.descargada);if(selDesc.includes('no'))datos=datos.filter(r=>!r.descargada);}
  if(fDesde)datos=datos.filter(r=>new Date(r.created_at)>=new Date(fDesde));
  if(fHasta)datos=datos.filter(r=>new Date(r.created_at)<=new Date(fHasta+'T23:59:59'));
  const totalNombres=[...new Set(todosLosReportes.map(r=>r.nombre))].length;
  updateDropdownLabel('nombre',totalNombres);updateDropdownLabel('tipo',3);updateDropdownLabel('estado',3);updateDropdownLabel('desc',2);
  renderQueue(datos);
  const hayF=selNombre.length<totalNombres||selTipo.length<3||selEstado.length<3||selDesc.length<2||fDesde||fHasta;
  const fc=document.getElementById('filter-count');
  if(fc)fc.textContent=hayF?`Mostrando ${datos.length} de ${todosLosReportes.filter(r=>tabActiva==='pend'?!r.done:r.done).length} reportes`:'';
  const total=todosLosReportes.length,done=todosLosReportes.filter(r=>r.done).length;
  document.getElementById('st-total').textContent=total;
  document.getElementById('st-pend').textContent=total-done;
  document.getElementById('st-done').textContent=done;
  actualizarBadge(total-done);
}

function renderQueue(data){
  const list=document.getElementById('queue-list');
  if(!data.length){list.innerHTML=`<div class="empty">${tabActiva==='pend'?'✅ Sin UPs pendientes.':'📭 Sin UPs verificadas.'}</div>`;return;}
  list.innerHTML=data.map((r,i)=>`
    <div class="queue-item ${r.done?'is-done':r.estado==='espera'?'is-espera':''} ${r.descargada?'is-flagged':''} ${seleccionados.has(r.id)?'selected':''}" id="qi-${r.id}">
      <button class="flag-btn ${r.descargada?'flagged':''}" onclick="toggleBandera(${r.id},${!r.descargada})" title="${r.descargada?'Quitar marca':'Marcar como descargada'}">🚩</button>
      <div class="queue-main">
        ${modoSeleccion?`<div class="queue-check"><input type="checkbox" ${seleccionados.has(r.id)?'checked':''} onchange="toggleCheck(${r.id})" /></div>`:''}
        <div class="queue-num">#${i+1}</div>
        <div class="queue-body">
          <div class="queue-id">${r.up_id}</div>
          <div class="queue-meta">${tipoPill(r.tipo)}<span class="queue-reporter">👤 ${r.nombre}</span>${r.estado==='espera'?'<span class="pill pill-espera">⏸ En espera</span>':''}</div>
          ${r.obs?`<div class="queue-obs">"${r.obs}"</div>`:''}
          ${r.respuesta?`<div style="margin-top:5px;font-size:12px;color:var(--warning-text);">💬 Respuesta: "${r.respuesta}"</div>`:''}
          <div class="queue-time">⏱ ${fmt(r.created_at)}</div>
        </div>
        <div class="queue-actions">
          ${!modoSeleccion?`
            ${r.done
              ?`<button class="btn btn-checked btn-sm" disabled>✓ Listo</button>
                <button class="btn btn-sm" onclick="toggleReply(${r.id})">💬 ${r.respuesta?'Editar':'Responder'}</button>`
              :r.estado==='espera'
                ?`<button class="btn btn-sm" style="background:var(--danger-light);color:var(--danger-text);border-color:var(--danger-border);" onclick="marcarPendiente(${r.id})">↩ Quitar espera</button>
                  <button class="btn btn-check btn-sm" onclick="abrirVerificar(${r.id})">✓ Marcar listo</button>`
                :`<button class="btn btn-sm" style="background:var(--danger-light);color:var(--danger-text);border-color:var(--danger-border);" onclick="marcarEspera(${r.id})">⏸ En espera</button>
                  <button class="btn btn-check btn-sm" onclick="abrirVerificar(${r.id})">✓ Marcar listo</button>`
            }
            <button class="btn btn-sm" style="color:var(--danger-text);border-color:var(--danger-border);" onclick="eliminarUno(${r.id})">🗑</button>
          `:''}
        </div>
      </div>
      ${!modoSeleccion?`
      <div class="reply-panel" id="reply-${r.id}">
        <label style="font-size:12px;margin-bottom:4px;">Observación para ${r.nombre}:</label>
        <textarea id="ta-reply-${r.id}" placeholder="Escribe tu observación…">${r.respuesta||''}</textarea>
        <div class="reply-row">
          <button class="btn btn-sm" onclick="toggleReply(${r.id})">Cancelar</button>
          <button class="btn btn-primary btn-sm" onclick="enviarRespuesta(${r.id})">💬 Enviar</button>
        </div>
      </div>
      ${!r.done?`
      <div class="reply-panel" id="verificar-${r.id}">
        <label style="font-size:12px;margin-bottom:4px;">Observación al verificar (opcional):</label>
        <textarea id="ta-verificar-${r.id}" placeholder="Escribe una observación para ${r.nombre}…"></textarea>
        <div class="reply-row">
          <button class="btn btn-sm" onclick="cerrarVerificar(${r.id})">Cancelar</button>
          <button class="btn btn-check btn-sm" onclick="marcarHecho(${r.id})">✓ Confirmar</button>
        </div>
      </div>`:''}
      `:''}
    </div>`).join('');
}

// ── Acciones cola ─────────────────────────────────────────────────────────────
function abrirVerificar(id){document.querySelectorAll('[id^="verificar-"],[id^="reply-"]').forEach(e=>e.classList.remove('open'));document.getElementById('verificar-'+id)?.classList.add('open');}
function cerrarVerificar(id){document.getElementById('verificar-'+id)?.classList.remove('open');}
function toggleReply(id){document.getElementById('reply-'+id)?.classList.toggle('open');}

async function marcarHecho(id){
  const ta=document.getElementById('ta-verificar-'+id);
  const resp=ta?ta.value.trim():null;
  const btn=event.target;btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{await sbPatch('reportes',id,{done:true,done_ts:new Date().toISOString(),respuesta:resp||null,respuesta_leida:!resp});cargarAdmin();}
  catch(e){alert('Error: '+e.message);btn.disabled=false;btn.innerHTML='✓ Confirmar';}
}
async function enviarRespuesta(id){
  const ta=document.getElementById('ta-reply-'+id);
  const resp=ta?ta.value.trim():'';
  if(!resp){alert('Escribe una observación antes de enviar.');return;}
  const btn=event.target;btn.disabled=true;btn.innerHTML='<span class="spinner"></span>';
  try{await sbPatch('reportes',id,{respuesta:resp,respuesta_leida:false});toggleReply(id);cargarAdmin();}
  catch(e){alert('Error: '+e.message);btn.disabled=false;btn.innerHTML='💬 Enviar';}
}
async function marcarEspera(id){try{await sbPatch('reportes',id,{estado:'espera'});cargarAdmin();}catch(e){alert('Error: '+e.message);}}
async function marcarPendiente(id){try{await sbPatch('reportes',id,{estado:'pendiente'});cargarAdmin();}catch(e){alert('Error: '+e.message);}}
async function eliminarUno(id){if(!confirm('¿Eliminar este reporte?'))return;try{await sbDeleteId('reportes',id);cargarAdmin();}catch(e){alert('Error: '+e.message);}}
async function toggleBandera(id,valor){
  try{
    await sbPatch('reportes',id,{descargada:valor});
    const idx=todosLosReportes.findIndex(r=>r.id===id);
    if(idx>=0)todosLosReportes[idx].descargada=valor;
    const item=document.getElementById('qi-'+id);
    const btn=item?.querySelector('.flag-btn');
    if(item)item.classList.toggle('is-flagged',valor);
    if(btn){btn.classList.toggle('flagged',valor);btn.title=valor?'Quitar marca':'Marcar como descargada';}
  }catch(e){alert('Error: '+e.message);}
}

// ── Selección múltiple ─────────────────────────────────────────────────────────
let modoSeleccion=false,seleccionados=new Set();
function toggleSeleccion(){
  modoSeleccion=!modoSeleccion;seleccionados.clear();
  const btn=document.getElementById('btn-sel-mode');if(btn)btn.textContent=modoSeleccion?'✕ Cancelar selección':'☑ Seleccionar';
  document.getElementById('bulk-bar')?.classList.remove('visible');
  cargarAdmin();
}
function cancelarSeleccion(){modoSeleccion=false;seleccionados.clear();const btn=document.getElementById('btn-sel-mode');if(btn)btn.textContent='☑ Seleccionar';document.getElementById('bulk-bar')?.classList.remove('visible');cargarAdmin();}
function toggleCheck(id){
  if(seleccionados.has(id))seleccionados.delete(id);else seleccionados.add(id);
  document.querySelector(`#qi-${id}`)?.classList.toggle('selected',seleccionados.has(id));
  const bar=document.getElementById('bulk-bar'),count=document.getElementById('bulk-count');
  if(bar&&count){bar.classList.toggle('visible',seleccionados.size>0);count.textContent=`${seleccionados.size} seleccionado${seleccionados.size!==1?'s':''}`;}
}
async function marcarSeleccionadosListos(){
  if(!seleccionados.size)return;
  const pend=[...seleccionados].filter(id=>{const r=todosLosReportes.find(x=>x.id===id);return r&&!r.done;});
  if(!pend.length){alert('Todos los seleccionados ya están verificados.');return;}
  if(!confirm(`¿Marcar ${pend.length} reporte(s) como verificados?`))return;
  try{await Promise.all(pend.map(id=>sbPatch('reportes',id,{done:true,done_ts:new Date().toISOString()})));cancelarSeleccion();}
  catch(e){alert('Error: '+e.message);}
}
async function eliminarSeleccionados(){
  if(!seleccionados.size)return;
  if(!confirm(`¿Eliminar ${seleccionados.size} reporte(s)?`))return;
  try{await sbDeleteMany('reportes',[...seleccionados]);cancelarSeleccion();}
  catch(e){alert('Error al eliminar: '+e.message);}
}

// ── Filtros tipo Excel ────────────────────────────────────────────────────────
function toggleDropdown(id,e){
  e.stopPropagation();
  document.querySelectorAll('.filter-dropdown-panel').forEach(p=>{if(p.id!==id)p.classList.remove('open');});
  document.getElementById(id)?.classList.toggle('open');
}
document.addEventListener('click',()=>document.querySelectorAll('.filter-dropdown-panel').forEach(p=>p.classList.remove('open')));
function toggleAllFilter(g,checked){document.querySelectorAll(`.fchk-${g}`).forEach(c=>c.checked=checked);aplicarFiltros();}
function onFilterChange(g){const all=[...document.querySelectorAll(`.fchk-${g}`)];const el=document.getElementById(`chk-all-${g}`);if(el)el.checked=all.every(c=>c.checked);aplicarFiltros();}
function getCheckedValues(g){return[...document.querySelectorAll(`.fchk-${g}:checked`)].map(c=>c.value);}
function updateDropdownLabel(g,total){
  const checked=getCheckedValues(g);
  const btn=document.getElementById(`btn-dd-${g}`);const lbl=document.getElementById(`lbl-${g}`);
  if(!btn||!lbl)return;
  if(checked.length===0){lbl.textContent='(Ninguno)';btn.classList.add('active');}
  else if(checked.length===total){lbl.textContent=g==='desc'?'Todas':'Todos';btn.classList.remove('active');}
  else{lbl.textContent=`${checked.length} sel.`;btn.classList.add('active');}
}
function poblarFiltroNombres(data){
  const nombres=[...new Set(data.map(r=>r.nombre))].sort();
  const container=document.getElementById('dd-nombre-items');if(!container)return;
  const prev=getCheckedValues('nombre');
  container.innerHTML=nombres.map(n=>`
    <div class="filter-chk-item"><input type="checkbox" class="fchk-nombre" value="${n}" ${prev.length===0||prev.includes(n)?'checked':''} onchange="onFilterChange('nombre')" /><label style="cursor:pointer;margin:0;font-weight:400;">${n}</label></div>`).join('');
  const el=document.getElementById('chk-all-nombre');if(el)el.checked=[...document.querySelectorAll('.fchk-nombre')].every(c=>c.checked);
}
function limpiarFiltros(){
  document.querySelectorAll('.fchk-nombre,.fchk-tipo,.fchk-estado,.fchk-desc').forEach(c=>c.checked=true);
  ['chk-all-nombre','chk-all-tipo','chk-all-estado','chk-all-desc'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=true;});
  ['btn-dd-nombre','btn-dd-tipo','btn-dd-estado','btn-dd-desc'].forEach(id=>document.getElementById(id)?.classList.remove('active'));
  ['lbl-nombre','lbl-tipo','lbl-estado'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='Todos';});
  const ld=document.getElementById('lbl-desc');if(ld)ld.textContent='Todas';
  const fd=document.getElementById('f-desde');if(fd)fd.value='';
  const fh=document.getElementById('f-hasta');if(fh)fh.value='';
  const fc=document.getElementById('filter-count');if(fc)fc.textContent='';
  renderQueue(todosLosReportes.filter(r=>tabActiva==='pend'?!r.done:r.done));
}

// ── Badge ──────────────────────────────────────────────────────────────────────
async function actualizarBadge(pend){
  if(pend===undefined){try{const d=await sbGet('reportes','done=eq.false&select=id');pend=d.length;}catch{return;}}
  const badge=document.getElementById('badge-admin');if(!badge)return;
  if(pend>0){badge.textContent=pend;badge.style.display='inline-flex';}else{badge.style.display='none';}
}

// ── Configuración ──────────────────────────────────────────────────────────────
async function cargarConfig(){try{const data=await sbGet('nombres','order=nombre.asc');document.getElementById('names-ta').value=data.map(n=>n.nombre).join('\n');}catch{}}
async function guardarNombres(){
  const names=document.getElementById('names-ta').value.split('\n').map(n=>n.trim()).filter(Boolean);
  showAlert('cfg-ok',false);showAlert('cfg-err',false);
  const btn=document.getElementById('btn-guardar');btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Guardando…';
  try{await sbDelete('nombres','id=gte.0');if(names.length)await sbPost('nombres',names.map(n=>({nombre:n})));showAlert('cfg-ok',true);setTimeout(()=>showAlert('cfg-ok',false),3000);cargarNombres();}
  catch(e){document.getElementById('cfg-err-msg').textContent=e.message;showAlert('cfg-err',true);}
  btn.disabled=false;btn.innerHTML='💾 Guardar lista';
}

// ── Lista UPs pendientes ───────────────────────────────────────────────────────
function getPendientes(){return todosLosReportes.filter(r=>!r.done);}
function verListaUPs(){
  const overlay=document.getElementById('modal-ups'),body=document.getElementById('modal-body');
  if(!overlay||!body)return;overlay.classList.add('open');
  const data=getPendientes();
  if(!data.length){body.innerHTML='<div class="empty">✅ Sin UPs pendientes.</div>';return;}
  const porNombre={};
  data.forEach(r=>{if(!porNombre[r.nombre])porNombre[r.nombre]=[];porNombre[r.nombre].push({up_id:r.up_id,tipo:r.tipo,estado:r.estado||'pendiente'});});
  const todosIds=[...new Set(data.map(r=>r.up_id))].sort();
  let html=`<div class="modal-sub"><strong>${todosIds.length}</strong> UPs pendientes · <strong>${Object.keys(porNombre).length}</strong> compañero(s)</div>`;
  html+=`<div class="modal-sec">IDs pendientes</div><div class="ups-grid">`;
  html+=todosIds.map(id=>`<div class="ups-chip">${id}</div>`).join('');
  html+=`</div><div class="modal-sec" style="margin-top:1.25rem;">Por reportante</div>`;
  Object.keys(porNombre).sort().forEach(nombre=>{
    const items=porNombre[nombre];const idsU=[...new Set(items.map(x=>x.up_id))];
    html+=`<div style="margin-bottom:.85rem;"><div style="font-size:13px;font-weight:600;color:var(--text-secondary);margin-bottom:6px;">👤 ${nombre} <span style="font-weight:400;color:var(--text-muted)">(${items.length})</span></div>
    <div class="ups-grid">${idsU.map(id=>{const e=items.find(x=>x.up_id===id&&x.estado==='espera');return`<div class="ups-chip" ${e?'style="background:var(--danger-light);color:var(--danger-text);border-color:var(--danger-border)"':''}>${id}${e?' ⏸':''}</div>`;}).join('')}</div></div>`;
  });
  body.innerHTML=html;
}
function cerrarModal(){document.getElementById('modal-ups')?.classList.remove('open');}
function copiarListaUPs(){
  const ids=[...new Set(getPendientes().map(r=>r.up_id))].sort();
  navigator.clipboard.writeText(ids.join('\n')).then(()=>{const btn=event.target.closest('button');const o=btn.innerHTML;btn.innerHTML='✓ Copiado';setTimeout(()=>{btn.innerHTML=o;},2000);});
}
function descargarExcelUPs(){
  const data=getPendientes();if(!data.length){alert('No hay UPs pendientes.');return;}
  const cols=['ID Unidad Productiva','Reportante','Tipo de verificación','Estado','Fecha reporte','Observaciones'];
  const filas=data.map(r=>[r.up_id,r.nombre,r.tipo||'',r.estado==='espera'?'En espera':'Pendiente',new Date(r.created_at).toLocaleDateString('es-CO'),r.obs||'']);
  const csv='\uFEFF'+[cols,...filas].map(row=>row.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const fecha=new Date().toLocaleDateString('es-CO').replace(/\//g,'-');
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`ups-pendientes-${fecha}.csv`;a.click();
}

// ── Iniciar ────────────────────────────────────────────────────────────────────
if(MODO_REPORTE){renderModoReporte();}else{renderModoAdmin();}
</script>
